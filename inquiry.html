<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="container">
        <header class="top-header">
            <div class="brand">
                <img src="images/cannons-coffee-logo.png" alt="Cannons Coffee logo" class="logo" />
                <h2>Cannons Coffee</h2>
            </div>

            <nav class="nav-bar">
                <ul>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="latte.html">Coffee</a></li>
                        <li><a href="index.html">About</a></li>
                        <li><a href="mailto:shannonmartinez358@gmail.com">Contact</a></li>
                        <li><a href="inquiry.html">Inquiry</a></li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </ul>
            </nav>
        </header>
        <main>
            <h1>Inquiry</h1>

            <form action="form" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required />

                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="4" cols="30"></textarea>

                <label for="flavor">Favorite Coffee Flavor</label>
                <select id="flavor" name="flavor" required>
                    <option value="">--Choose a flavor--</option>
                    <option value="vanilla">Vanilla</option>
                    <option value="mocha">Mocha</option>
                    <option value="hazelnut">Hazelnut</option>
                </select>

                <p>What are you interested in?</p>

                <input type="radio" id="buying" name="interest" value="buying coffee" required />
                <label for="buying">Buying Coffee</label>

                <input type="radio" id="employment" name="interest" value="seeking employment" />
                <label for="employment">Seeking Employment</label>

                <div>
                    <button type="submit">Submit</button>
                </div>
            </form>


        </main>
        <footer>
            <img src="images/cannons-coffee-logo.png" alt="Cannons Coffee Logo " />
            <h1>CANNONS COFFEE</h1>
            <p>&copy; 2023 Cannons Coffee. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/custom-inquiry.js"></script>
</body>

</html>
