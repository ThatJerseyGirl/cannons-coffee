<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cannons Coffee</title>
    <link rel="stylesheet" href="css/style.css" />


</head>

<body>
    <div class="container">
        <header class="top-header">
            <div class="brand">
                <img src="images/cannons-coffee-logo.png" alt="Cannons Coffee logo" class="logo" />
                <h2>Cannons Coffee</h2>
            </div>

            <nav class="nav-bar">
                <ul>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="latte.html">Coffee</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="mailto:shannonmartinez358@gmail.com">Contact</a></li>
                        <li><a href="inquiry.html">Inquiry</a></li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </ul>
            </nav>
        </header>

        <main class="inquiry-section">

            <h2 class="inquiry-title">Inquiry</h2>

            <form class="form2">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" />

                <label for="email">Email</label>
                <input type="email" id="email" name="email" />

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" />

                <label for="comments">Comments</label>
                <textarea id="comments" name="comments"></textarea>

                <label for="flavor">Favorite Coffee Flavor</label>
                <select id="flavor" name="flavor">
                    <option value="">--Choose a flavor--</option>
                    <option value="vanilla">Vanilla</option>
                    <option value="mocha">Mocha</option>
                    <option value="hazelnut">Hazelnut</option>
                </select>

                <p class="inquiry-paragraph">What are you interested in?</p>

                <label for="buying-coffee">Buying Coffee</label>
                <input type="radio" id="buying-coffee" name="interest" value="buying coffee" />

                <label for="seeking-employment">Seeking Employment</label>
                <input type="radio" id="seeking-employment" name="interest" value="seeking employment" />

                <button type="submit">Submit</button>
            </form>


        </main>

        <footer>
            <img src="images/cannons-coffee-logo.png" alt="Cannons Coffee Logo" />
            <h1>CANNONS COFFEE</h1>
            <p>&copy; 2023 Cannons Coffee. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/custom-inquiry.js"></script>
</body>

</html>
